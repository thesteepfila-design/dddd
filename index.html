<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI Undress</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="bg__mesh"></div><div class="bg__grid"></div><div class="bg__noise"></div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="topbar__title">AI Undress</div>
      <button class="iconbtn" type="button" id="btnInfo" aria-label="Инфо">i</button>
    </header>

    <main class="content">
      <section class="user">
        <img class="user__avatar" id="avatar" src="assets/avatar.jpg" alt="avatar" />
        <div class="user__meta">
          <div class="user__name" id="username">Пользователь</div>
          <div class="user__sub" id="sub">@...</div>
        </div>
      </section>

      <section class="card balance">
        <div class="balance__row">
          <div class="balance__label">Баланс:</div>
          <div class="balance__value"><span id="balance">0</span> <span class="coin">⭐</span></div>
        </div>

        <div class="packs">
          <button class="pack" data-pack="10"><div class="pack__n">10⭐</div><div class="pack__s">быстро</div></button>
          <button class="pack" data-pack="50"><div class="pack__n">50⭐</div><div class="pack__s">выгодно</div></button>
          <button class="pack pack--hot" data-pack="100"><div class="pack__n">100⭐</div><div class="pack__s">топ</div></button>
        </div>

        <div class="hint">Оплата внутри Telegram через Stars. После оплаты баланс обновится автоматически.</div>
      </section>

      <h3 class="sectionTitle">🎁 Реферальная система</h3>

      <section class="card ref">
        <div class="ref__stats">
          <div class="stat"><div class="stat__value" id="refs">0</div><div class="stat__label">ДРУЗЕЙ</div></div>
          <div class="stat"><div class="stat__value"><span id="earned">0</span> ⭐</div><div class="stat__label">ЗАРАБОТАНО</div></div>
        </div>

        <div class="ref__text">
          Приглашай друзей и получай <span id="percent">20%</span> от их пополнений ⭐
        </div>

        <div class="ref__link">
          <input id="reflink" value="..." readonly />
          <button class="iconbtn iconbtn--accent" id="btnCopy" type="button" aria-label="Копировать">📋</button>
        </div>

        <button class="btn btn--accent" id="btnShare">Поделиться ссылкой ↗</button>
      </section>

      <section class="card mini">
        <div class="mini__row">
          <div class="mini__title">Статус</div>
          <div class="mini__pill" id="status">подключаемся…</div>
        </div>
        <div class="mini__muted" id="backendInfo">Backend: —</div>
      </section>
    </main>

    <nav class="bottom">
      <button class="navbtn navbtn--active" type="button">Главная</button>
      <button class="fab" type="button" id="fab">+</button>
      <button class="navbtn" type="button" id="btnProfile">Профиль</button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
